# This file was created automatically with `myst init --gh-pages` 🪄 💚
# Ensure your GitHub Pages settings for this repository are set to deploy with **GitHub Actions**.

name: MyST GitHub Pages Deploy
on:
  push:
    # Runs on pushes targeting the default branch
    branches: [main]
env:
  # `BASE_URL` determines, relative to the root of the domain, the URL that your site is served from.
  # E.g., if your site lives at `https://mydomain.org/myproject`, set `BASE_URL=/myproject`.
  # If, instead, your site lives at the root of the domain, at `https://mydomain.org`, set `BASE_URL=''`.
  # The site is served at vknight.org/gtb, so the base URL is /gtb (not the repository name, gt).
  BASE_URL: /gtb

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # A full cold build re-executes every notebook; bound it so a stuck notebook
    # or Typst compile fails fast rather than hanging.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install Typst
        uses: typst-community/setup-typst@v3
      - name: Install dependencies
        run: uv sync
      # Persist MyST's notebook execution cache between runs so unchanged
      # chapters are not re-executed. MyST validates the cache by content hash,
      # so a restored stale cache only re-runs the notebooks that changed.
      - name: Restore MyST execution cache
        uses: actions/cache@v4
        with:
          path: _build/execute
          key: myst-execute-${{ hashFiles('chapters/**/index.md', 'appendices/**/index.md', 'uv.lock') }}
          restore-keys: |
            myst-execute-
      - name: Build HTML site
        run: uv run myst build --execute --execute-parallel 4 --html
      # Reuses the execution cache populated by the HTML build, so this only
      # compiles the Typst PDF and does not re-execute the notebooks.
      - name: Build PDF
        run: uv run myst build --execute --typst
      - name: Add the PDF to the site
        run: |
          mkdir -p _build/html/pdf
          cp exports/main.pdf _build/html/pdf/main.pdf
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_build/html"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
