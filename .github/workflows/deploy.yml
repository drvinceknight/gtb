# This file was created automatically with `myst init --gh-pages` 🪄 💚
# Ensure your GitHub Pages settings for this repository are set to deploy with **GitHub Actions**.

name: MyST GitHub Pages Deploy
on:
  push:
    # Runs on pushes targeting the default branch
    branches: [main]
env:
  # `BASE_URL` determines, relative to the root of the domain, the URL that your site is served from.
  # E.g., if your site lives at `https://mydomain.org/myproject`, set `BASE_URL=/myproject`.
  # If, instead, your site lives at the root of the domain, at `https://mydomain.org`, set `BASE_URL=''`.
  # The site is served at vknight.org/gtb, so the base URL is /gtb (not the repository name, gt).
  BASE_URL: /gtb

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false
# The build and deploy are split into two jobs: the build job uploads the
# `github-pages` artifact once, and the deploy job only deploys it. This keeps
# the artifact upload out of the deploy job, so re-running a failed deploy does
# not upload a second `github-pages` artifact (which would make deploy-pages
# fail with "Multiple artifacts named github-pages ... count is 2").
jobs:
  build:
    runs-on: ubuntu-latest
    # A full cold build re-executes every notebook; bound it so a stuck notebook
    # or Typst compile fails fast rather than hanging.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install Typst
        uses: typst-community/setup-typst@v3
      # Fail early and clearly if Typst is not actually on the PATH: without it
      # MyST exports the .typ but skips the PDF render and still exits 0.
      - name: Verify Typst is available
        run: typst --version
      - name: Install dependencies
        run: uv sync
      # Persist MyST's notebook execution cache between runs so unchanged
      # chapters are not re-executed. MyST validates the cache by content hash,
      # so a restored stale cache only re-runs the notebooks that changed. The
      # cache is only saved when the job succeeds, so the build must not fail.
      - name: Restore MyST execution cache
        uses: actions/cache@v4
        with:
          path: _build/execute
          key: myst-execute-${{ hashFiles('chapters/**/index.md', 'appendices/**/index.md', 'uv.lock') }}
          restore-keys: |
            myst-execute-
      # Build the HTML site and the Typst PDF in a single pass: MyST executes
      # each notebook once and renders the PDF to exports/main.pdf. We then
      # assert the PDF exists so a skipped render fails here, with diagnostics,
      # rather than silently later.
      - name: Build HTML site and PDF
        run: |
          uv run myst build --execute --execute-parallel 4 --html --typst
          if [ ! -f exports/main.pdf ]; then
            echo "::error::Typst PDF was not produced at exports/main.pdf"
            echo "Contents of exports/:"; ls -la exports/ 2>&1 || true
            echo "Embedded site PDFs:"; ls -la _build/html/build/*.pdf 2>&1 || true
            exit 1
          fi
      - name: Add the PDF to the site
        run: |
          mkdir -p _build/html/pdf
          cp exports/main.pdf _build/html/pdf/main.pdf
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_build/html"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
